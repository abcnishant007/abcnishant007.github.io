name: Update GitHub Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh contribution data
        run: python scripts/update_github_contributions.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/github-contributions.json
          git commit -m "Update GitHub contributions data" || echo "No changes to commit"
          git push
